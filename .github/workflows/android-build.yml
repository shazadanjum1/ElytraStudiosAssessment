name: Android CI

on:
  push:
    branches: [ master ]   # Runs automatically on every push to main
  pull_request:
    branches: [ master ]   # Runs automatically on every PR targeting main (required)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Ensure the Gradle wrapper script has execute permissions on Linux runners
      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      # Step 3: Set up JDK 17 (matches your Gradle compileOptions/kotlinOptions)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 4:  Cache Gradle dependencies for faster builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Build Dev Debug variant
      - name: Build Dev Debug
        run: ./gradlew assembleDevDebug

      # Upload Dev Debug APK
      - name: Upload Dev Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-debug-apk
          path: app/build/outputs/apk/dev/debug/*.apk

      # Build Mock Debug variant
      - name: Build Mock Debug
        run: ./gradlew assembleMockDebug

      # Upload Mock Debug APK
      - name: Upload Mock Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mock-debug-apk
          path: app/build/outputs/apk/mock/debug/*.apk

      # Build Prod Release variant
      - name: Build Prod Release
        run: ./gradlew assembleProdRelease

      # Upload Prod Release APK
      - name: Upload Prod Release APK
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apk
          path: app/build/outputs/apk/prod/release/*.apk
